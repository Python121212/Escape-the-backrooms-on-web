<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Escape the Backrooms on Web</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #000; color: #eee; font-family: sans-serif; overflow: hidden; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; background: #111; transition: opacity 0.5s ease; }
        #status { font-size: 1.2rem; margin-bottom: 15px; color: #ffd700; font-weight: bold; text-align: center; padding: 0 20px; word-break: break-all; }
        #progress-bar { width: 80%; max-width: 400px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        #progress { width: 0%; height: 100%; background: #ffd700; transition: width 0.1s linear; }
        
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: block; z-index: 1; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="status">システム初期化中...</div>
    <div id="progress-bar"><div id="progress"></div></div>
</div>

<canvas id="game-canvas"></canvas>

<script type="module">
    import { BackroomsRenderer } from './renderer.js';

    const statusEl = document.getElementById('status');
    const progressEl = document.getElementById('progress');
    const uiLayer = document.getElementById('ui-layer');
    const canvas = document.getElementById('game-canvas');

    let renderer = null;
    let animationFrameId = null;

    // グローバルエラーハンドリング（予期せぬスクリプトエラーを画面に拘束）
    window.addEventListener('error', (e) => showError(`Runtime Error: ${e.message} (${e.filename}:${e.lineno})`));
    window.addEventListener('unhandledrejection', (e) => showError(`Promise Error: ${e.reason}`));
    
    // WebGPUの内部エラーをインターセプトするリスナー
    window.addEventListener('game-error', (e) => showError(e.detail));

    function showError(msg) {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        uiLayer.style.display = 'flex';
        uiLayer.style.opacity = 1;
        statusEl.textContent = msg;
        statusEl.style.color = '#ff3333';
        progressEl.style.background = '#ff3333';
    }

    // 1. Worker起動
    const assetWorker = new Worker('asset-worker.js');
    const R2_ASSET_URL = 'https://your-r2-bucket-url.cloudflare.com/level0.pak'; 

    assetWorker.onmessage = async (e) => {
        const { type, message, progress } = e.data;

        switch (type) {
            case 'STATUS':
                statusEl.textContent = message;
                break;
            case 'PROGRESS':
                progressEl.style.width = `${progress}%`;
                break;
            case 'SUCCESS':
                statusEl.textContent = 'アセット展開完了。WebGPUグラフィックスを起動中...';
                try {
                    renderer = new BackroomsRenderer(canvas);
                    await renderer.init();

                    uiLayer.style.opacity = 0;
                    setTimeout(() => uiLayer.style.display = 'none', 500);

                    startRenderLoop();
                } catch (err) {
                    showError(err.message);
                }
                break;
            case 'ERROR':
                showError(`[Storage Worker]: ${message}`);
                break;
        }
    };

    function startRenderLoop() {
        function loop() {
            if (renderer && renderer.device) {
                renderer.render();
                animationFrameId = requestAnimationFrame(loop);
            }
        }
        animationFrameId = requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => {
        if (renderer) renderer.resize();
    });

    assetWorker.postMessage({ cmd: 'START_LOAD', url: R2_ASSET_URL });
</script>
</body>
</html>
