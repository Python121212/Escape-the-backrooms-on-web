<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Escape the Backrooms on Web</title>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #000; color: #eee; font-family: sans-serif; overflow: hidden; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; background: #111; transition: opacity 0.5s ease; }
        #status { font-size: 1.2rem; margin-bottom: 15px; color: #ffd700; font-weight: bold; text-align: center; padding: 0 20px; word-break: break-all; white-space: pre-wrap; line-height: 1.6; }
        #progress-bar { width: 80%; max-width: 400px; height: 8px; background: #333; border-radius: 4px; overflow: hidden; }
        #progress { width: 0%; height: 100%; background: #ffd700; transition: width 0.1s linear; }
        
        canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: block; z-index: 1; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="status">コアシステム初期化中...</div>
    <div id="progress-bar"><div id="progress"></div></div>
</div>

<canvas id="game-canvas"></canvas>

<script type="module">
    import { BackroomsRenderer } from './renderer.js';

    const statusEl = document.getElementById('status');
    const progressEl = document.getElementById('progress');
    const uiLayer = document.getElementById('ui-layer');
    const canvas = document.getElementById('game-canvas');

    let renderer = null;
    let animationFrameId = null;

    // 🚨 エラー監視インターセプト
    window.addEventListener('error', (e) => showError(`【Runtime Error】\n${e.message}\n場所: ${e.filename}:${e.lineno}`));
    window.addEventListener('unhandledrejection', (e) => showError(`【Promise Rejection】\n${e.reason}`));
    window.addEventListener('game-error', (e) => showError(e.detail));

    function showError(msg) {
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        uiLayer.style.display = 'flex';
        uiLayer.style.opacity = 1;
        statusEl.textContent = msg;
        statusEl.style.color = '#ff3333';
        progressEl.style.background = '#ff3333';
        console.error(msg);
    }

    // 🧵 3スレッド初期化
    const assetWorker = new Worker('asset-worker.js');
    const wasmWorker = new Worker('wasm-worker.js');

    // ★ダミーテストモードのフラグ
    // R2のURLが「your-r2-bucket-url」を含んでいる場合、自動的にローカルエミュレートに切り替えます
    const R2_ASSET_URL = 'https://your-r2-bucket-url.cloudflare.com/level0.pak'; 

    assetWorker.onmessage = async (e) => {
        const { type, message, progress } = e.data;

        switch (type) {
            case 'STATUS':
                statusEl.textContent = `[Storage] ${message}`;
                break;
            case 'PROGRESS':
                progressEl.style.width = `${progress}%`;
                break;
            case 'SUCCESS':
                initGraphicsAndEngine();
                break;
            case 'ERROR':
                // 【Failed to fetch】を検知したら、開発用のローカル擬似生成モードへ強制サルベージ
                if (message.includes('Failed to fetch') || R2_ASSET_URL.includes('your-r2-bucket-url')) {
                    console.warn("[⚠️開発モード発動] R2が未設定のため、ブラウザ内でテスト用アセットを自動ビルドします...");
                    runLocalAssetEmulator();
                } else {
                    showError(`[Storage IO Error]:\n${message}`);
                }
                break;
        }
    };

    // ブラウザのストレージ(OPFS)内に、テストを突破するための偽アセットを直接叩き込む
    async function runLocalAssetEmulator() {
        try {
            statusEl.textContent = "[Local Emulator] テスト用ダミーバイナリを構築中...";
            const root = await navigator.storage.getDirectory();
            
            // 1. ダミーのlevel0.pakを作成
            const pakHandle = await root.getFileHandle('level0.pak', { create: true });
            const pakAccess = await pakHandle.createSyncAccessHandle();
            const dummyPakData = new Uint8Array([0x50, 0x41, 0x4B, 0x01, 0x00]); // "PAK"ヘッダー
            pakAccess.write(dummyPakData, { at: 0 });
            pakAccess.flush();
            pakAccess.close();

            // 2. 最低限のWebAssemblyバイナリ構造（空のWinMainを持つ最小Wasmモジュール）を生成
            // これがないと演算層が「中身が空っぽ」と怒るため、有効なWasmヘッダーを持つ最小バイナリを注入
            const wasmHandle = await root.getFileHandle('engine_core.wasm', { create: true });
            const wasmAccess = await wasmHandle.createSyncAccessHandle();
            
            // 最小限の有効なWasmマジックナンバー [0x00, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00]
            const minWasmBytes = new Uint8Array([
                0x00, 0x61, 0x73, 0x6d, 0x01, 0x00, 0x00, 0x00
            ]);
            wasmAccess.write(minWasmBytes, { at: 0 });
            wasmAccess.flush();
            wasmAccess.close();

            // 即座に成功フェーズへスキップ
            initGraphicsAndEngine();

        } catch (err) {
            showError(`[Emulator Failed]: ${err.message}`);
        }
    }

    wasmWorker.onmessage = (e) => {
        const { type, message, meshId, transform } = e.data;

        switch (type) {
            case 'WASM_STATUS':
                statusEl.textContent = `[Engine Core] ${message}`;
                break;
            case 'WASM_READY':
                console.log("[Engine Core] WinMainのシミュレート成功。");
                uiLayer.style.opacity = 0;
                setTimeout(() => uiLayer.style.display = 'none', 500);
                break;
            case 'WASM_DRAW_CALL':
                if (renderer && renderer.device) {
                    renderer.pushMeshToRenderQueue(meshId, transform);
                }
                break;
            case 'WASM_ERROR':
                // 現段階ではダミーWasmに本物のWinMain関数が入っていないため、ここでエラーが出るのが正解
                showError(message);
                break;
        }
    };

    async function initGraphicsAndEngine() {
        try {
            statusEl.textContent = "WebGPU グラフィックスエンジンを起動中...";
            
            renderer = new BackroomsRenderer(canvas);
            await renderer.init();

            startRenderLoop();

            // 演算コア（WinMain）をキック
            wasmWorker.postMessage({ cmd: 'BOOT_ENGINE' });

        } catch (err) {
            showError(`[Graphics Initialize Failed]:\n${err.message}`);
        }
    }

    function startRenderLoop() {
        function loop() {
            if (renderer && renderer.device) {
                renderer.render();
                animationFrameId = requestAnimationFrame(loop);
            }
        }
        animationFrameId = requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => {
        if (renderer) renderer.resize();
    });

    assetWorker.postMessage({ cmd: 'START_LOAD', url: R2_ASSET_URL });
</script>
</body>
</html>
